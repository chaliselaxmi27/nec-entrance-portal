<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if site %}{{ site.college_name }}{% else %}NEC Entrance{% endif %}</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #222;
            line-height: 1.6;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        img {
            max-width: 100%;
            display: block;
        }

        .container {
            width: 92%;
            max-width: 1240px;
            margin: 0 auto;
        }

        /* TOP BAR */
        .topbar {
            background: #ffffff;
            border-bottom: 1px solid #e8edf5;
            font-size: 13px;
        }

        .topbar-container {
            min-height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .topbar-left,
        .topbar-right,
        .top-contact {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .topbar-right a {
            color: #1b2f57;
            font-weight: 500;
        }

        .topbar-right a:hover {
            color: #0b3d91;
        }

        .enquiry-btn {
            background: #0b3d91;
            color: #fff !important;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 700 !important;
        }

        .social-link {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #eef3fb;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }

        /* MAIN HEADER */
        .main-header {
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.06);
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            padding: 18px 0;
            flex-wrap: wrap;
        }

        .brand-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-logo {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            overflow: hidden;
            background: #eef3fb;
            border: 2px solid #dbe6f8;
            flex-shrink: 0;
        }

        .brand-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0b3d91;
            font-weight: 800;
        }

        .brand-text h1 {
            font-size: 24px;
            color: #123166;
            line-height: 1.15;
        }

        .brand-text p {
            color: #4b5f86;
            font-size: 14px;
            margin-top: 4px;
        }

        .main-nav {
            display: flex;
            align-items: center;
            gap: 22px;
            flex-wrap: wrap;
        }

        .main-nav a {
            color: #17305f;
            font-weight: 700;
            font-size: 15px;
            position: relative;
        }

        .main-nav a:hover {
            color: #0b3d91;
        }

        /* HERO */
        .hero {
            min-height: 560px;
            display: flex;
            align-items: center;
            position: relative;
            background: linear-gradient(rgba(8, 31, 78, 0.70), rgba(8, 31, 78, 0.78)),
                        url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            color: #fff;
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(8,31,78,0.55), rgba(8,31,78,0.25));
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 760px;
            padding: 90px 0;
        }

        .hero-tag {
            display: inline-block;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.25);
            backdrop-filter: blur(3px);
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 14px;
            margin-bottom: 18px;
        }

        .hero h1 {
            font-size: 52px;
            line-height: 1.15;
            margin-bottom: 18px;
        }

        .hero p {
            font-size: 19px;
            color: #f3f6ff;
            margin-bottom: 28px;
            max-width: 640px;
        }

        .hero-actions {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 13px 22px;
            border-radius: 8px;
            font-weight: 700;
            transition: 0.2s ease;
        }

        .btn-primary {
            background: #f4b334;
            color: #111;
        }

        .btn-primary:hover {
            background: #e4a528;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.14);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.30);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.22);
        }

        .hero-stats {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
            margin-top: 36px;
        }

        .stat-box {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.18);
            backdrop-filter: blur(4px);
            padding: 18px;
            border-radius: 12px;
        }

        .stat-box h3 {
            font-size: 28px;
            margin-bottom: 4px;
        }

        .stat-box p {
            font-size: 14px;
            margin: 0;
            color: #ecf2ff;
        }

        /* COMMON SECTIONS */
        .section {
            padding: 75px 0;
        }

        .section-light {
            background: #fff;
        }

        .section-soft {
            background: #eef4ff;
        }

        .section-title-wrap {
            text-align: center;
            max-width: 760px;
            margin: 0 auto 38px;
        }

        .section-kicker {
            color: #0b3d91;
            font-weight: 800;
            letter-spacing: 0.7px;
            text-transform: uppercase;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .section-title {
            font-size: 36px;
            line-height: 1.2;
            color: #10234d;
            margin-bottom: 12px;
        }

        .section-subtitle {
            color: #60708e;
            font-size: 16px;
        }

        .cards-2 {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 26px;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(13, 37, 89, 0.08);
        }

        .card-title {
            color: #0b3d91;
            font-size: 24px;
            margin-bottom: 18px;
        }

        /* NOTICE */
        .notice-item {
            padding: 18px 0;
            border-bottom: 1px solid #e8edf7;
        }

        .notice-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .notice-date {
            color: #7a859b;
            font-size: 13px;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .notice-title a {
            color: #18284c;
            font-size: 19px;
            font-weight: 800;
        }

        .notice-title a:hover {
            color: #0b3d91;
        }

        .notice-desc {
            color: #5f6c84;
            margin-top: 8px;
            font-size: 15px;
        }

        .notice-actions {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
.notice-ticker {
    background: #0b3d91;
    color: white;
    font-size: 14px;
}

.ticker-container {
    display: grid;
    grid-template-columns: 160px 1fr;
    align-items: center;
}

.ticker-title {
    padding: 10px;
    font-weight: bold;
    background: #082c6d;
}

.ticker-wrapper {
    overflow: hidden;
    height: 40px;
    display: flex;
    align-items: center;
}

.ticker-track {
    display: inline-flex;
    white-space: nowrap;
    animation: tickerMove 25s linear infinite;
}

.ticker-item {
    margin-right: 40px;
}

.ticker-item a {
    color: white;
}

.ticker-item::before {
    content: "• ";
    color: #f4b334;
}

@keyframes tickerMove {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}


        /* BUTTON SMALL */
        .btn-small {
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            display: inline-block;
        }

        .btn-blue {
            background: #0b3d91;
            color: #fff;
        }

        .btn-blue:hover {
            background: #082b69;
        }

        .btn-gold {
            background: #f4b334;
            color: #111;
        }

        .btn-gold:hover {
            background: #e4a528;
        }

        /* REQUIREMENTS */
        .requirements-list {
            list-style: none;
        }

        .requirements-list li {
            padding: 14px 0;
            border-bottom: 1px solid #e8edf7;
        }

        .requirements-list li:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .requirements-list strong {
            display: block;
            color: #1c2e55;
            margin-bottom: 5px;
            font-size: 16px;
        }

        .requirements-list span {
            color: #5f6c84;
            font-size: 15px;
        }
        /* DOWNLOAD PAGE */

.downloads-title{
font-size:40px;
color:#0b3d91;
margin-bottom:40px;
}

.downloads-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.download-card{
background:#ffffff;
border:1px solid #e3e8f3;
border-radius:12px;
padding:22px;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.2s;
}

.download-card:hover{
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transform:translateY(-2px);
}

.download-left{
display:flex;
gap:16px;
align-items:flex-start;
}

.download-icon{
font-size:26px;
background:#edf3ff;
width:52px;
height:52px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
}

.download-title{
font-size:18px;
margin-bottom:5px;
color:#0b3d91;
}

.download-desc{
font-size:14px;
color:#666;
}

.download-btn{
background:#0b3d91;
color:white;
padding:10px 18px;
border-radius:6px;
font-weight:600;
}

.download-btn:hover{
background:#082b69;
}

        /* HIGHLIGHTS */
        .highlight-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .highlight-box {
            background: #fff;
            border-radius: 16px;
            padding: 28px 24px;
            box-shadow: 0 10px 28px rgba(12, 40, 91, 0.07);
            text-align: center;
        }

        .highlight-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #e8f0ff;
            color: #0b3d91;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-weight: 800;
        }

        .highlight-box h3 {
            color: #14264d;
            margin-bottom: 10px;
            font-size: 20px;
        }

        .highlight-box p {
            color: #60708e;
            font-size: 15px;
        }

        /* PROGRAMS */
        .program-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 28px;
        }

        .program-card {
            overflow: hidden;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100%;
            border-radius: 18px;
        }

        .program-image {
            width: 100%;
            height: 260px;
            background: #dbe5fa;
            overflow: hidden;
        }

        .program-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .program-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .program-body h3 {
            color: #0b3d91;
            margin-bottom: 12px;
            font-size: 22px;
            line-height: 1.3;
        }

        .program-body h3 a:hover {
            color: #07285f;
        }

        .program-body p {
            color: #60708e;
            font-size: 15px;
            margin-bottom: 18px;
            line-height: 1.7;
        }

        .program-meta {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: auto;
            margin-bottom: 18px;
        }

        .program-meta div {
            background: #f4f7fd;
            border-radius: 10px;
            padding: 12px 10px;
            text-align: center;
        }

        .program-meta strong {
            display: block;
            color: #0b3d91;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .program-meta span {
            color: #3b4b68;
            font-size: 15px;
            font-weight: 700;
        }

        .program-action {
            margin-top: 4px;
        }

        .program-action .btn-small {
            display: inline-block;
        }

        /* SCHOLARSHIP */
        .scholarship-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .scholarship-card {
            border-left: 5px solid #f4b334;
        }

        .scholarship-card h3 {
            color: #0b3d91;
            margin-bottom: 10px;
            font-size: 20px;
        }

        .scholarship-card p {
            color: #60708e;
            font-size: 15px;
        }

        /* CTA */
        .cta-section {
            background: linear-gradient(135deg, #0b3d91, #102a63);
            color: #fff;
            border-radius: 24px;
            padding: 52px 40px;
            text-align: center;
        }

        .cta-section h2 {
            font-size: 34px;
            margin-bottom: 12px;
        }

        .cta-section p {
            max-width: 760px;
            margin: 0 auto 24px;
            color: #eaf1ff;
            font-size: 16px;
        }
        /* HOME DOWNLOADS PREVIEW */
.home-downloads-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 22px;
}

.home-download-card {
    background: #fff;
    border: 1px solid #e2e9f8;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 8px 20px rgba(13, 37, 89, 0.05);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 18px;
    transition: 0.2s ease;
}

.home-download-card:hover {
    box-shadow: 0 12px 26px rgba(13, 37, 89, 0.09);
    transform: translateY(-2px);
}

.home-download-left {
    display: flex;
    align-items: flex-start;
    gap: 14px;
}

.home-download-icon {
    min-width: 50px;
    height: 50px;
    border-radius: 12px;
    background: #edf3ff;
    color: #0b3d91;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
}

.home-download-card h3 {
    font-size: 18px;
    color: #0b3d91;
    margin-bottom: 6px;
    line-height: 1.3;
}

.home-download-card p {
    font-size: 14px;
    color: #60708e;
    line-height: 1.7;
}

.home-download-actions {
    margin-top: auto;
}

        /* FOOTER */
        .nec-footer {
            background: #0b2d67;
            color: #fff;
            margin-top: 50px;
        }

        .footer-top-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 1fr;
            gap: 28px;
            padding: 50px 0 34px;
        }

        .footer-col h4 {
            font-size: 18px;
            margin-bottom: 14px;
            color: #ffffff;
        }

        .footer-col ul {
            list-style: none;
        }

        .footer-col ul li {
            margin-bottom: 10px;
            color: #d8e5ff;
            font-size: 15px;
        }

        .footer-col ul li a {
            color: #d8e5ff;
        }

        .footer-col ul li a:hover {
            color: #ffffff;
        }

        .footer-brand {
            display: flex;
            gap: 14px;
            align-items: center;
            margin-bottom: 14px;
        }

        .footer-logo {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            overflow: hidden;
            background: rgba(255,255,255,0.10);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
        }

        .footer-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .footer-brand h3 {
            font-size: 22px;
            line-height: 1.2;
        }

        .footer-brand p,
        .footer-desc {
            color: #d8e5ff;
            font-size: 15px;
        }

        .footer-bottom {
            border-top: 1px solid rgba(255,255,255,0.12);
            padding: 16px 0;
            background: #08224f;
        }

        .footer-bottom-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            color: #dbe6ff;
            font-size: 14px;
        }

        /* RESPONSIVE */
        @media (max-width: 1100px) {
            .hero-stats,
            .highlight-grid,
            .program-grid,
            .scholarship-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .footer-top-grid {
                grid-template-columns: 1fr 1fr;
            }
            .home-downloads-grid {
    grid-template-columns: repeat(2, 1fr);
}
        }

        @media (max-width: 900px) {
            .cards-2 {
                grid-template-columns: 1fr;
            }

            .header-container {
                align-items: flex-start;
            }

            .main-nav {
                width: 100%;
                gap: 14px;
            }

            .hero h1 {
                font-size: 40px;
            }

            .section-title {
                font-size: 30px;
            }

            .hero-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 700px) {
            .footer-top-grid {
                grid-template-columns: 1fr;
            }

            .brand-text h1 {
                font-size: 20px;
            }

            .topbar-container,
            .header-container,
            .footer-bottom-row {
                flex-direction: column;
                align-items: flex-start;
            }
            @media (max-width:800px){

.downloads-grid{
grid-template-columns:1fr;
}

.download-card{
flex-direction:column;
align-items:flex-start;
gap:15px;
}

.download-btn{
width:100%;
text-align:center;
}

}
        }

        @media (max-width: 680px) {
            .hero {
                min-height: auto;
            }

            .hero-content {
                padding: 70px 0;
            }

            .hero h1 {
                font-size: 31px;
            }

            .hero p {
                font-size: 16px;
            }

            .section {
                padding: 58px 0;
            }

            .section-title {
                font-size: 26px;
            }

            .hero-stats,
            .highlight-grid,
            .program-grid,
            .scholarship-grid,
            .program-meta {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 22px;
            }

            .program-image {
                height: 220px;
            }
            .home-downloads-grid {
    grid-template-columns: 1fr;
}
         

    }


        
    </style>
</head>
<body>

    {% include 'includes/header.html' %}

    {% block content %}{% endblock %}

    {% include 'includes/footer.html' %}

</body>
</html>
